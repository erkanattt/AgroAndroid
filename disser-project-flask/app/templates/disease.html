{% extends 'layout.html' %} {% block body %}

  <div class="row">
    <div class="col-md-12">
      <h3 class="text-center">Узнайте, какой болезнью заболело ваше растение</h3>
    </div>
  </div>



  


<div class="row mt-5 mb-5">
  <div class="col-md-12 mb-5">
    <form class="form-signin" method="post" enctype="multipart/form-data">

      <h2 class="h4 mb-3 font-weight-normal"><b>Пожалуйста, загрузите изображение</b></h2>
      <input type="file" name="file" class="form-control-file" id="inputfile" onchange="preview_image(event)" style="font-weight: bold;">
      <br>
      <br>
      <img id="output-image" class="rounded mx-auto d-block" style="max-width:40rem" />
      <button type="submit" class="btn btn-primary">Предсказать</button>
  
  
    </form>
  </div>
</div>


<script type="text/javascript">
  function preview_image(event) {
    var reader = new FileReader();
    reader.onload = function () {
      var output = document.getElementById('output-image')
      output.src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
  }
</script>


{% endblock %}
